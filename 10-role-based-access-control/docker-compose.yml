services:
  postgres:
    image: postgres:17.4
    restart: always
    environment:
      POSTGRES_DB: role_based_access_control
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata: